labels:
  source: .github/labels.json
  synchronization_workflow: .github/workflows/odts-labels.yml
  project_specific_additions_allowed: true

github_pages:
  required_when_repository_publishes_a_website: true
  branch: gh_pages
  deployment: github-actions
  workflow: .github/workflows/jekyll-gh-pages.yml
odts:
  version: "1.9.5"

issue_metadata:
  version:
    id: odts_version
    label: ODTS Version
    source: odts.version
    preserve_existing: true

repository_feedback:
  custom_property:
    name: ODTS Status
    required: false
    source: derived
